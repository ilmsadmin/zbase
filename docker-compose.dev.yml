version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    container_name: zbase-app-dev
    ports:
      - '3001:3001'
    depends_on:
      - postgres
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
    env_file: .env
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - zbase-network
      
  postgres:
    image: postgres:latest
    container_name: zbase
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./db/zbase.sql:/docker-entrypoint-initdb.d/zbase.sql
    networks:
      - zbase-network

volumes:
  postgres_data_dev:
    name: zbase-postgres-data-dev

networks:
  zbase-network:
    name: zbase-network
